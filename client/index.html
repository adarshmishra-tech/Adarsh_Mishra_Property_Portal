<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Portal | Real Estate</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <div id="auth-section" class="min-h-screen flex items-center justify-center">
        <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-96 border border-gray-700">
            <h2 id="auth-title" class="text-2xl font-bold mb-6 text-center text-blue-400">Login to Portal</h2>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full p-3 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-blue-500">
                <input type="password" id="password" placeholder="Password" class="w-full p-3 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-blue-500">
                <button onclick="handleAuth()" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded font-bold transition">Continue</button>
                <p class="text-sm text-center text-gray-400 cursor-pointer hover:text-white" onclick="toggleAuthMode()">Don't have an account? Register</p>
            </div>
        </div>
    </div>

    <div id="dashboard-section" class="hidden min-h-screen p-8">
        <header class="flex justify-between items-center mb-10 border-b border-gray-800 pb-5">
            <div>
                <h1 class="text-3xl font-bold">Welcome, <span id="user-name" class="text-blue-400">Buyer</span></h1>
                <p class="text-gray-400 text-sm">Role: <span id="user-role"></span></p>
            </div>
            <button onclick="logout()" class="text-red-400 hover:text-red-300">Logout</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="property-list">
            </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
